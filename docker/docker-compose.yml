version: "3.9"

services:

  # ── SQLite lives inside the web container via a named volume ─────
  # No separate DB service needed. The volume below persists the file
  # across container restarts.

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries:  5

  # ── Django / Daphne (ASGI) ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - sqlite_data:/app/db        # same volume as web — shared SQLite file
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
      - sqlite_data:/app/db        # persists weathersense.sqlite3
    expose:
      - "8000"

  # ── Celery Worker ─────────────────────────────────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config worker --concurrency=4 --loglevel=info -Q celery
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Celery Beat ───────────────────────────────────────────────────
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }

  # ── Nginx (reverse proxy + static) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
      - media:/media:ro
      - ./ssl:/etc/nginx/ssl:ro      # mount TLS certs here
    depends_on:
      - web

volumes:
  pg_data:
  staticfiles:
  media: